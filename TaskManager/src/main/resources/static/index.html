<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<h1> Task Manager</h1>

<div class="container">

    <!-- USERS -->
    <div class="box">
        <h2>Add User</h2>
        <input id="name" placeholder="Name"><br>
        <input id="email" placeholder="Email"><br>
        <input id="password" placeholder="Password"><br>
        <button onclick="addUser()">Add User</button>

        <h3>Users List</h3>
        <ul id="users"></ul>
    </div>

    <!-- TASKS -->
    <div class="box">
        <h2>Add Task</h2>
        <input id="title" placeholder="Title"><br>
        <input id="desc" placeholder="Description"><br>
        <input id="status" placeholder="Status (PENDING/COMPLETED)"><br>
        <input id="userId" placeholder="User ID"><br>
        <button onclick="addTask()">Add Task</button>

        <h3>Tasks List</h3>
        <ul id="tasks"></ul>
    </div>

</div>


<script src="Js/script.js"></script>
</body>
</html>
